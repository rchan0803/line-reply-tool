<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE 返信案ツール</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hiragino Sans', 'Meiryo', sans-serif; background: #f0f2f5; color: #333; height: 100vh; display: flex; flex-direction: column; }

  header {
    background: #00b900;
    color: white;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 { font-size: 18px; font-weight: bold; }
  header button {
    background: white;
    color: #00b900;
    border: none;
    border-radius: 6px;
    padding: 6px 14px;
    cursor: pointer;
    font-size: 13px;
    font-weight: bold;
  }
  header button:hover { background: #e8f5e9; }

  .main { display: flex; flex: 1; overflow: hidden; }

  /* Left panel */
  .sidebar {
    width: 300px;
    background: white;
    border-right: 1px solid #e0e0e0;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .sidebar-header {
    padding: 12px 16px;
    font-size: 13px;
    color: #888;
    border-bottom: 1px solid #f0f0f0;
    font-weight: bold;
  }
  .conv-item {
    padding: 14px 16px;
    border-bottom: 1px solid #f5f5f5;
    cursor: pointer;
    transition: background 0.15s;
  }
  .conv-item:hover { background: #f9f9f9; }
  .conv-item.active { background: #e8f5e9; border-left: 3px solid #00b900; }
  .conv-name { font-weight: bold; font-size: 14px; margin-bottom: 4px; }
  .conv-preview { font-size: 12px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .conv-time { font-size: 11px; color: #bbb; margin-top: 4px; }
  .empty-state { padding: 40px 20px; text-align: center; color: #aaa; font-size: 14px; }

  /* Right panel */
  .chat-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .chat-header {
    padding: 14px 20px;
    background: white;
    border-bottom: 1px solid #e0e0e0;
    font-weight: bold;
    font-size: 15px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .msg {
    max-width: 70%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.inbound {
    background: white;
    border: 1px solid #e0e0e0;
    align-self: flex-start;
    border-radius: 2px 12px 12px 12px;
  }
  .msg.outbound {
    background: #dcf8c6;
    align-self: flex-end;
    border-radius: 12px 2px 12px 12px;
  }
  .msg-time { font-size: 11px; color: #aaa; margin-top: 3px; }
  .msg-wrapper { display: flex; flex-direction: column; }
  .msg-wrapper.inbound { align-items: flex-start; }
  .msg-wrapper.outbound { align-items: flex-end; }

  /* Draft panel */
  .draft-panel {
    background: white;
    border-top: 2px solid #00b900;
    padding: 16px 20px;
  }
  .draft-label {
    font-size: 12px;
    font-weight: bold;
    color: #00b900;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .draft-label span { color: #888; font-weight: normal; font-size: 11px; }
  .draft-text {
    background: #f9fbe7;
    border: 1px solid #e6ee9c;
    border-radius: 8px;
    padding: 12px;
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    margin-bottom: 10px;
    min-height: 60px;
  }
  .draft-actions { display: flex; gap: 10px; }
  .btn {
    padding: 8px 18px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: bold;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-copy { background: #00b900; color: white; }
  .btn-regen { background: #f5f5f5; color: #555; border: 1px solid #ddd; }
  .btn-regen.loading { color: #aaa; }

  .no-selection {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #bbb;
    font-size: 15px;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #333;
    color: white;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 999;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <h1>LINE 返信案ツール</h1>
  <button onclick="reloadManual()">マニュアル再読み込み</button>
</header>

<div class="main">
  <!-- 左：会話リスト -->
  <div class="sidebar">
    <div class="sidebar-header">会話一覧</div>
    <div id="conv-list"><div class="empty-state">メッセージなし</div></div>
  </div>

  <!-- 右：チャット + 返信案 -->
  <div class="chat-panel" id="chat-panel">
    <div class="no-selection">←左から会話を選択してください</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let currentUserId = null;
let refreshTimer = null;

function formatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const isToday = d.toDateString() === now.toDateString();
  if (isToday) return d.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
  return d.toLocaleDateString('ja-JP', { month: 'numeric', day: 'numeric' }) + ' ' +
         d.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
}

async function loadConversations() {
  const res = await fetch('/api/conversations');
  const convs = await res.json();
  const list = document.getElementById('conv-list');
  if (convs.length === 0) {
    list.innerHTML = '<div class="empty-state">まだメッセージがありません</div>';
    return;
  }
  list.innerHTML = convs.map(c => `
    <div class="conv-item ${c.user_id === currentUserId ? 'active' : ''}"
         onclick="selectConv('${c.user_id}', '${(c.display_name || c.user_id).replace(/'/g, "\\'")}')">
      <div class="conv-name">${c.display_name || c.user_id}</div>
      <div class="conv-preview">${c.last_message ? c.last_message.slice(0, 40) : ''}</div>
      <div class="conv-time">${formatTime(c.last_at)}</div>
    </div>
  `).join('');
}

async function selectConv(userId, displayName) {
  currentUserId = userId;
  await loadConversations(); // refresh active state
  await loadChat(userId, displayName);
  startAutoRefresh(userId, displayName);
}

function startAutoRefresh(userId, displayName) {
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(() => {
    loadConversations();
    if (currentUserId === userId) loadChat(userId, displayName);
  }, 10000);
}

async function loadChat(userId, displayName) {
  const res = await fetch(`/api/messages/${userId}`);
  const data = await res.json();
  const panel = document.getElementById('chat-panel');

  const messagesHtml = data.messages.map(m => `
    <div class="msg-wrapper ${m.direction}">
      <div class="msg ${m.direction}">${escapeHtml(m.content)}</div>
      <div class="msg-time">${formatTime(m.created_at)}</div>
    </div>
  `).join('');

  const draftContent = data.draft ? data.draft.content : '（返信案なし）';
  const draftTime = data.draft ? `生成: ${formatTime(data.draft.created_at)}` : '';

  panel.innerHTML = `
    <div class="chat-header">
      <span>${escapeHtml(displayName)}</span>
    </div>
    <div class="chat-messages" id="messages-area">
      ${messagesHtml || '<div style="color:#bbb;text-align:center;margin-top:40px">メッセージなし</div>'}
    </div>
    <div class="draft-panel">
      <div class="draft-label">
        返信案
        <span id="draft-time">${draftTime}</span>
      </div>
      <div class="draft-text" id="draft-text">${escapeHtml(draftContent)}</div>
      <div class="draft-actions">
        <button class="btn btn-copy" onclick="copyDraft()">コピー</button>
        <button class="btn btn-regen" id="regen-btn" onclick="regenerate('${userId}', '${displayName.replace(/'/g, "\\'")}')">返信案を再生成</button>
      </div>
    </div>
  `;

  // scroll to bottom
  const area = document.getElementById('messages-area');
  if (area) area.scrollTop = area.scrollHeight;
}

async function regenerate(userId, displayName) {
  const btn = document.getElementById('regen-btn');
  if (!btn) return;
  btn.disabled = true;
  btn.textContent = '生成中...';
  btn.classList.add('loading');

  try {
    const res = await fetch(`/api/regenerate/${userId}`, { method: 'POST' });
    const data = await res.json();
    document.getElementById('draft-text').textContent = data.draft;
    document.getElementById('draft-time').textContent = `生成: ${formatTime(new Date().toISOString())}`;
    showToast('返信案を再生成しました');
  } catch(e) {
    showToast('エラーが発生しました');
  } finally {
    btn.disabled = false;
    btn.textContent = '返信案を再生成';
    btn.classList.remove('loading');
  }
}

function copyDraft() {
  const text = document.getElementById('draft-text')?.textContent;
  if (!text || text === '（返信案なし）') return;
  navigator.clipboard.writeText(text).then(() => showToast('コピーしました'));
}

async function reloadManual() {
  try {
    const res = await fetch('/api/reload-manual', { method: 'POST' });
    const data = await res.json();
    showToast(`マニュアル再読み込み完了（${data.characters.toLocaleString()}文字）`);
  } catch(e) {
    showToast('エラーが発生しました');
  }
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// 初回ロード
loadConversations();
setInterval(loadConversations, 15000);
</script>
</body>
</html>
